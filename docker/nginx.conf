server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: routes handled by Angular router.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Basic caching for static assets (hashing is enabled in prod builds).
  location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
