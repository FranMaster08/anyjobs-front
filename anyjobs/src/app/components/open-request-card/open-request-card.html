<article class="card">
  <a class="mediaLink" [routerLink]="detailLink" [attr.aria-label]="ariaLabel">
    <div class="media">
      <div class="mediaBadges" *ngIf="request().tags?.length">
        <span class="badge" *ngFor="let t of request().tags; let i = index" [hidden]="i > 1">{{ t }}</span>
      </div>

      <ng-container *ngIf="request().imageUrl; else placeholder">
        <img class="media__img" [src]="request().imageUrl" [alt]="request().imageAlt ?? ''" loading="lazy" />
      </ng-container>
      <ng-template #placeholder>
        <div class="media__placeholder" aria-hidden="true"></div>
      </ng-template>
    </div>
  </a>

  <div class="body">
    <a class="titleLink" [routerLink]="detailLink">{{ request().excerpt }}</a>

    <div class="meta" *ngIf="request().locationLabel || request().publishedAtLabel || request().budgetLabel">
      <span class="meta__item" *ngIf="request().publishedAtLabel">{{ request().publishedAtLabel }}</span>
      <span class="meta__sep" *ngIf="request().publishedAtLabel && request().locationLabel">·</span>
      <span class="meta__item" *ngIf="request().locationLabel">{{ request().locationLabel }}</span>
    </div>

    <div class="actions">
      <a class="btn" [routerLink]="detailLink">Ver detalles</a>
      <button type="button" class="btn btn--secondary" (click)="$event.preventDefault()">Comparar</button>
    </div>
  </div>
</article>
