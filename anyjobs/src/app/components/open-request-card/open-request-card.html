<article class="card" [attr.data-open-request-id]="request().id">
  <a
    class="mediaLink"
    [href]="detailHref()"
    [attr.aria-label]="ariaLabel"
    (click)="openDetail($event)"
  >
    <div class="media">
      <div class="mediaBadges" *ngIf="request().tags?.length">
        <span class="badge" *ngFor="let t of request().tags; let i = index" [hidden]="i > 1">{{
          t
        }}</span>
      </div>

      <ng-container *ngIf="request().imageUrl; else placeholder">
        <img
          class="media__img"
          [src]="request().imageUrl"
          [alt]="request().imageAlt ?? ''"
          loading="lazy"
        />
      </ng-container>
      <ng-template #placeholder>
        <div class="media__placeholder" aria-hidden="true"></div>
      </ng-template>
    </div>
  </a>

  <div class="body">
    <a class="titleLink" [href]="detailHref()" (click)="openDetail($event)">{{ request().excerpt }}</a>

    <div
      class="chips"
      *ngIf="request().locationLabel || request().publishedAtLabel || request().budgetLabel"
    >
      <span class="chip" *ngIf="request().publishedAtLabel">{{ request().publishedAtLabel }}</span>
      <span class="chip" *ngIf="request().locationLabel">{{ request().locationLabel }}</span>
      <span class="chip chip--budget" *ngIf="request().budgetLabel">{{ request().budgetLabel }}</span>
    </div>

    <div class="actions">
      <button type="button" class="btn" (click)="openDetail($event)">Ver detalles</button>
    </div>
  </div>
</article>
