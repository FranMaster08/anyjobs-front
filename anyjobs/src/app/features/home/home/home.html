<section class="homeSliderPage" aria-label="Inicio">
  @if (!loaded()) {
    <p class="homeSliderLoading" aria-live="polite">Cargando…</p>
  } @else if (loadFailed()) {
    <p class="homeSliderEmpty" role="status">No se pudieron cargar las promociones.</p>
  } @else if (slides().length === 0) {
    <p class="homeSliderEmpty" role="status">No hay contenido promocional por ahora.</p>
  } @else {
    <div #homeSliderWrap class="homeSliderWrap">
      <media-slider
        [slides]="slides()"
        (doubleTap)="onDoubleTap()"
        (mutedChange)="onMutedChange($event)"
        (slideAction)="onSlideAction($event)"
        (slideFollow)="onSlideFollow($event)"
      />
    </div>
  }
  <app-home-mobile-bottom-nav />
</section>
